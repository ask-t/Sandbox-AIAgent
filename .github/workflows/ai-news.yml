name: AI News Email (Daily)

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 JST 7:00 (UTC 22:00 前日)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Google OAuth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: bash scripts/setup-google-auth.sh

      - name: Run Gemini Agent - AI News
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: bash scripts/run-gemini-agent.sh instructions/ai-news.md
