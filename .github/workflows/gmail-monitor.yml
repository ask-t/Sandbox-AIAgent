name: Gmail Monitor (Periodic)

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'  # 6時間ごと (JST 10:00, 16:00, 22:00, 04:00)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gemini CLI
        id: cache-gemini
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: gemini-cli-v1

      - name: Install Gemini CLI
        if: steps.cache-gemini.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g @google/gemini-cli

      - name: Add Gemini CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Setup Google OAuth
        env:
          GEMINI_TOKEN_JSON: ${{ secrets.GEMINI_TOKEN_JSON }}
        run: bash scripts/setup-google-auth.sh

      - name: Run Gemini Agent - Gmail Monitor
        env:
          GOOGLE_GENAI_USE_GCA: "true"
        run: bash scripts/run-gemini-agent.sh instructions/gmail-monitor.md
